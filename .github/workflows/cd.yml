name: ChatService Production CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: chatservice-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean bootJar

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create directories on server
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            mkdir -p ${{ vars.APP_ROOT }}/app/logs
            mkdir -p ${{ vars.APP_ROOT }}/config
          "

      - name: Upload jar
        run: |
          scp build/libs/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ vars.APP_ROOT }}/app/app.jar

      - name: Write application-prod.yml on server
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cat > ${{ vars.APP_ROOT }}/config/application-prod.yml" <<EOF
          spring:
            datasource:
              url: ${DB_URL}
              username: ${DB_USERNAME}
              password: ${DB_PASSWORD}
            security:
              oauth2:
                client:
                  registration:
                    google:
                      client-id: ${GOOGLE_CLIENT_ID}
                      client-secret: ${GOOGLE_CLIENT_SECRET}
            servlet:
              multipart:
                max-file-size: 10MB
                max-request-size: 10MB

          jwt:
            secret: ${JWT_SECRET}

          management:
            endpoints:
              web:
                exposure:
                  include: health
            endpoint:
              health:
                show-details: always
          EOF
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Restart app with prod profile
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            pkill -f 'app.jar' || true
            nohup java -jar \
              -Dserver.port=8080 \
              -Dspring.config.additional-location=${{ vars.APP_ROOT }}/config/ \
              -Dspring.profiles.active=${{ vars.SPRING_PROFILE }} \
              ${{ vars.APP_ROOT }}/app/app.jar \
              > ${{ vars.APP_ROOT }}/app/logs/app-8080.log 2>&1 &
